<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kartu Ujian Presisi v4.2 - F4 Center Lock</title>
    <style>
        :root {
            --bg-app: #1a1a2e;
            --panel-bg: #16213e;
            --accent: #48abe0;
            --text-light: #e9ecef;
            --card-blue: #004a99; 
            --card-bg-gradient: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            --sidebar-width: 320px; /* Lebar sidebar kiri */
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg-app); 
            margin: 0; padding: 0; 
            color: var(--text-light); 
            display: flex; /* Mengaktifkan layout kolom (Sidebar & Content) */
        }
        
        /* SIDEBAR CONFIGURATION */
        .no-print {
            background: var(--panel-bg);
            padding: 25px;
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed; /* Mengunci posisi di kiri */
            left: 0;
            top: 0;
            overflow-y: auto; /* Jika menu sangat panjang bisa di-scroll */
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            border-right: 1px solid #2d4059;
            z-index: 1000;
            box-sizing: border-box;
        }

        .header-app { border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        
        /* Mengatur Grid Config menjadi satu kolom untuk tampilan sidebar yang rapi */
        .grid-config { display: flex; flex-direction: column; gap: 20px; }
        
        label { display: block; font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        input, select, button { background: #0f3460; border: 1px solid #2d4059; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; transition: 0.3s; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: #358fbd; transform: translateY(-2px); }
        .btn-clear { background: #e94560; margin-top: 10px; }

        /* CONTENT AREA (PREVIEW) */
        #main-content {
            margin-left: var(--sidebar-width); /* Memberi ruang untuk sidebar */
            flex-grow: 1;
            padding: 30px;
            min-height: 100vh;
            background: #d1d9e6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, 8.56cm);
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .card {
            width: 8.56cm;
            height: 5.398cm;
            background: var(--card-bg-gradient);
            color: #333;
            border: 1px dashed #999; 
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            page-break-inside: avoid;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card .watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 2.8cm; opacity: 0.08; z-index: 0;
        }

        .card-header { 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2.5px solid var(--card-blue); 
            padding-bottom: 4px; margin-bottom: 4px; z-index: 2; 
        }

        .logo-small { width: 1.1cm; height: 1.1cm; object-fit: contain; }
        .header-text { flex-grow: 1; text-align: center; padding: 0 3px; }
        .school-name { font-size: 8.5pt; font-weight: 800; margin: 0; color: var(--card-blue); line-height: 1.1; text-transform: uppercase; }
        .exam-title { font-size: 6.5pt; color: #d63031; font-weight: bold; margin: 1px 0; }
        .academic-year { font-size: 6pt; margin: 0; font-weight: bold; color: #555; }

        .card-body { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
        .number-main { 
            font-size: 48pt; font-weight: 900; color: var(--card-blue);
            background: rgba(255,255,255,0.85); 
            padding: 0 25px; border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1); line-height: 1.2;
        }

        .card-footer { 
            background: var(--card-blue); color: white;
            margin: 0 -8px -8px -8px; padding: 6px; text-align: center; z-index: 2; 
        }
        .student-name { font-size: 9pt; font-weight: bold; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .student-details { font-size: 7.5pt; opacity: 0.9; }

        /* ==========================================================
           MODIFIKASI PRESISI CETAK - F4 CENTER LOCK
           ========================================================== */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            @page { 
                size: 215mm 330mm; /* Standar F4 */
                margin: 10mm; /* Margin Fisik 1cm Keliling */
            }
            
            body { 
                background: white !important; 
                margin: 0 !important;
                padding: 0 !important;
                width: 195mm; 
                color: black;
                display: block !important; /* Nonaktifkan Flex saat print agar center-lock bekerja */
            }

            .no-print { display: none !important; }
            
            #main-content {
                margin-left: 0 !important; /* Hilangkan margin sidebar saat print */
                padding: 0 !important;
                background: transparent !important;
            }

            #preview-container { 
                display: grid !important; 
                grid-template-columns: 8.56cm 8.56cm !important; 
                gap: 5mm 5mm !important; 
                background: transparent !important; 
                padding: 0 !important;
                margin: 0 auto !important; 
                justify-content: center !important;
                align-content: start !important;
            }

            .card { 
                border: 0.3pt solid #000 !important; 
                box-shadow: none !important;
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="header-app">
        <h2 style="margin:0; font-size: 18px;">💎 Card Generator Pro</h2>
        <p style="font-size: 11px; color: #888; margin: 5px 0 0 0;">v4.2 Precision F4 Sidebar</p>
    </div>
    
    <div class="grid-config">
        <div>
            <label>Sekolah & Tahun</label>
            <input type="text" id="schoolName" value="SDN MUARA BAKTI 01" oninput="syncAndSave()">
            <input type="text" id="yearName" value="2024/2025" style="margin-top:10px" oninput="syncAndSave()">
        </div>
        <div>
            <label>Ujian & Filter</label>
            <input type="text" id="examTitle" value="NOMOR SUMATIF TENGAH SEMESTER ( STS )" oninput="syncAndSave()">
            <select id="filterKelas" onchange="syncAndSave()" style="margin-top:10px">
                <option value="all">Semua Kelas</option>
                <option value="1">Kelas 1</option><option value="2">Kelas 2</option>
                <option value="3">Kelas 3</option><option value="4">Kelas 4</option>
                <option value="5">Kelas 5</option><option value="6">Kelas 6</option>
            </select>
        </div>
        <div>
            <label>Aksi & Database</label>
            <input type="file" id="csvFileInput" accept=".csv,.xlsx,.xls" onchange="handleFileUpload()">
            <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
                <button onclick="safePrint()">🖨️ CETAK (F4 - 1CM)</button>
                <button class="btn-clear" onclick="clearData()">🗑️ RESET DATA</button>
            </div>
        </div>
    </div>
    <div style="background: #2a3a5a; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 10px; border-left: 4px solid #ff9f43; color: #e9ecef; line-height: 1.4;">
        <strong>PETUNJUK CETAK:</strong><br>
        1. Browser <b>Chrome/Edge</b>.<br>
        2. Kertas: <b>F4 (215 x 330 mm)</b>.<br>
        3. Margin: <b>Default</b>.<br>
        4. Scale: <b>100</b>.
    </div>
</div>

<div id="main-content">
    <div id="preview-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
    const LOGO_L = "tutwuri_putih.png"; 
    const LOGO_R = "logo_bekasi.jpg"; 

    window.onload = () => {
        ['schoolName', 'examTitle', 'yearName', 'filterKelas'].forEach(id => {
            const val = localStorage.getItem('cfg_' + id);
            if (val !== null && val !== undefined) document.getElementById(id).value = val;
        });
        renderCards();

        const savedScrollY = parseInt(localStorage.getItem('ui_scrollY') || '0', 10);
        if (Number.isFinite(savedScrollY) && savedScrollY > 0) {
            setTimeout(() => window.scrollTo(0, savedScrollY), 50);
        }

        window.addEventListener('scroll', scheduleSaveScroll, { passive: true });
    };

    function syncAndSave() {
        localStorage.setItem('cfg_schoolName', document.getElementById('schoolName').value);
        localStorage.setItem('cfg_examTitle', document.getElementById('examTitle').value);
        localStorage.setItem('cfg_yearName', document.getElementById('yearName').value);
        localStorage.setItem('cfg_filterKelas', document.getElementById('filterKelas').value);
        renderCards();
    }

    function handleFileUpload() {
        const file = document.getElementById('csvFileInput').files[0];
        if (!file) return;
        const ext = (file.name.split('.').pop() || '').toLowerCase();

        if (ext === 'csv') {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = parseCSVToStudents(String(e.target.result || ''));
                localStorage.setItem('db_murid', JSON.stringify(data));
                renderCards();
            };
            reader.readAsText(file);
            return;
        }

        if (ext === 'xlsx' || ext === 'xls') {
            if (typeof XLSX === 'undefined') {
                alert('Library pembaca Excel belum tersedia. Pastikan internet aktif, lalu refresh halaman.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const arrayBuffer = e.target.result;
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: true, defval: '' });
                const data = parseRowsToStudents(rows);
                localStorage.setItem('db_murid', JSON.stringify(data));
                renderCards();
            };
            reader.readAsArrayBuffer(file);
            return;
        }

        alert('Format file tidak didukung. Gunakan CSV / Excel (.xlsx / .xls).');
    }

    function renderCards() {
        const container = document.getElementById('preview-container');
        const data = readStoredJSON('db_murid', []);
        const filter = document.getElementById('filterKelas').value;
        const sch = document.getElementById('schoolName').value;
        const exm = document.getElementById('examTitle').value;
        const yer = document.getElementById('yearName').value;

        container.innerHTML = '';
        const filteredData = filter === 'all' ? data : data.filter(m => m.kelas.includes(filter));

        if(filteredData.length === 0) {
            container.innerHTML = `<div style="color:#666; padding:50px; grid-column: 1/-1; text-align:center;">Data Kosong / Silahkan Upload CSV/Excel</div>`;
            return;
        }

        let htmlContent = '';
        filteredData.forEach((murid) => {
            const noMeja = padSeatNumber(murid.noMeja);
            htmlContent += `
                <div class="card">
                    <img src="${LOGO_L}" class="watermark" onerror="this.style.display='none'">
                    <div class="card-header">
                        <img src="${LOGO_L}" class="logo-small" onerror="this.style.opacity='0'">
                        <div class="header-text">
                            <h1 class="school-name">${sch}</h1>
                            <p class="exam-title">${exm}</p>
                            <p class="academic-year">TAHUN PELAJARAN ${yer}</p>
                        </div>
                        <img src="${LOGO_R}" class="logo-small" onerror="this.style.opacity='0'">
                    </div>
                    <div class="card-body"><div class="number-main">${noMeja}</div></div>
                    <div class="card-footer">
                        <div class="student-name">${murid.nama}</div>
                        <div class="student-details">NISN: ${murid.nisn} | KELAS: ${murid.kelas}</div>
                    </div>
                </div>`;
        });
        container.innerHTML = htmlContent;
    }

    function safePrint() {
        setTimeout(() => { window.print(); }, 500);
    }

    function clearData() {
        if (confirm('Hapus semua data?')) {
            [
                'db_murid',
                'cfg_schoolName',
                'cfg_examTitle',
                'cfg_yearName',
                'cfg_filterKelas',
                'ui_scrollY'
            ].forEach((k) => localStorage.removeItem(k));
            location.reload();
        }
    }

    function readStoredJSON(key, fallback) {
        try {
            const raw = localStorage.getItem(key);
            if (!raw) return fallback;
            const parsed = JSON.parse(raw);
            return parsed ?? fallback;
        } catch (_) {
            return fallback;
        }
    }

    function padSeatNumber(value) {
        const v = String(value ?? '').trim();
        if (!v) return '000';
        const digits = v.replace(/[^\d]/g, '');
        if (!digits) return '000';
        return digits.slice(0, 6).padStart(3, '0');
    }

    let scrollSaveTimer = null;
    function scheduleSaveScroll() {
        if (scrollSaveTimer) return;
        scrollSaveTimer = setTimeout(() => {
            scrollSaveTimer = null;
            localStorage.setItem('ui_scrollY', String(window.scrollY || 0));
        }, 150);
    }

    function normalizeHeaderName(header) {
        return String(header ?? '')
            .trim()
            .toLowerCase()
            .replace(/\s+/g, ' ')
            .replace(/[\.\-_/]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function findColumnIndex(headers, candidates, fallbackIndex) {
        const normalizedHeaders = headers.map(normalizeHeaderName);
        for (const c of candidates) {
            const idx = normalizedHeaders.indexOf(normalizeHeaderName(c));
            if (idx !== -1) return idx;
        }
        if (Number.isInteger(fallbackIndex) && fallbackIndex >= 0 && fallbackIndex < headers.length) return fallbackIndex;
        return -1;
    }

    function parseRowsToStudents(rows) {
        if (!Array.isArray(rows) || rows.length === 0) return [];
        const headerRow = Array.isArray(rows[0]) ? rows[0] : [];
        const headers = headerRow.map((h, i) => (String(h ?? '').trim() ? String(h ?? '').trim() : `kolom_${i + 1}`));

        const idxNama = findColumnIndex(headers, ['nama', 'nama siswa', 'nama peserta', 'nama lengkap'], 0);
        const idxNisn = findColumnIndex(headers, ['nisn', 'nis', 'no nisn', 'nomor nisn'], 1);
        const idxKelas = findColumnIndex(headers, ['kelas', 'rombel', 'kelas/rombel'], 2);
        const idxNoMeja = findColumnIndex(headers, ['no meja', 'nomor meja', 'no meja ujian', 'no. meja', 'no_meja', 'nomeja'], 3);

        const dataRows = rows.slice(1);
        const students = [];
        for (const row of dataRows) {
            if (!Array.isArray(row)) continue;
            const nama = String(row[idxNama] ?? '').trim();
            const nisn = String(row[idxNisn] ?? '').trim();
            const kelas = String(row[idxKelas] ?? '').trim();
            const noMeja = row[idxNoMeja];
            if (!nama && !nisn && !kelas && (noMeja === null || noMeja === undefined || String(noMeja).trim() === '')) continue;
            students.push({ nama, nisn, kelas, noMeja: String(noMeja ?? '').trim() });
        }
        return students;
    }

    function detectDelimiter(line) {
        const candidates = [',', ';', '\t', '|'];
        let best = { delim: ';', count: -1 };
        for (const d of candidates) {
            const c = (line.match(new RegExp(`\\${d}`, 'g')) || []).length;
            if (c > best.count) best = { delim: d, count: c };
        }
        return best.delim;
    }

    function splitCSVLine(line, delimiter) {
        const out = [];
        let cur = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                const next = line[i + 1];
                if (inQuotes && next === '"') {
                    cur += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
                continue;
            }
            if (!inQuotes && ch === delimiter) {
                out.push(cur);
                cur = '';
                continue;
            }
            cur += ch;
        }
        out.push(cur);
        return out;
    }

    function parseCSVToStudents(text) {
        const cleaned = String(text ?? '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        const lines = cleaned.split('\n').filter((l) => l.trim() !== '');
        if (lines.length === 0) return [];

        const delimiter = detectDelimiter(lines[0]);
        const rawHeaders = splitCSVLine(lines[0], delimiter).map((h, i) => (String(h ?? '').trim() ? String(h ?? '').trim() : `kolom_${i + 1}`));

        const idxNama = findColumnIndex(rawHeaders, ['nama', 'nama siswa', 'nama peserta', 'nama lengkap'], 0);
        const idxNisn = findColumnIndex(rawHeaders, ['nisn', 'nis', 'no nisn', 'nomor nisn'], 1);
        const idxKelas = findColumnIndex(rawHeaders, ['kelas', 'rombel', 'kelas/rombel'], 2);
        const idxNoMeja = findColumnIndex(rawHeaders, ['no meja', 'nomor meja', 'no meja ujian', 'no. meja', 'no_meja', 'nomeja'], 3);

        const students = [];
        for (const line of lines.slice(1)) {
            const cols = splitCSVLine(line, delimiter);
            const nama = String(cols[idxNama] ?? '').trim();
            const nisn = String(cols[idxNisn] ?? '').trim();
            const kelas = String(cols[idxKelas] ?? '').trim();
            const noMeja = String(cols[idxNoMeja] ?? '').trim();
            if (!nama && !nisn && !kelas && !noMeja) continue;
            students.push({ nama, nisn, kelas, noMeja });
        }
        return students;
    }
</script>
</body>
</html>
